# cargo-deny policy (§1.5, D10). Runtime dependencies must be AGPL-3.0-compatible;
# unknown or source-available licenses fail CI. Review path for exceptions:
# CONTRIBUTING.md "Dependency-license policy" (open a `decision-needed` issue).

[graph]
all-features = true

[licenses]
version = 2
allow = [
  "AGPL-3.0-only", # our own workspace crates
  "MIT",
  "ISC",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "0BSD",
  "Zlib",
  "BSL-1.0",
  "MPL-2.0",
  "CC0-1.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
]
# Add narrowly-scoped exceptions here only with a linked decision-needed issue:
exceptions = []

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
