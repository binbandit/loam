# cargo-nextest profiles (see SPEC.md D10).
# Local runs use `default`; CI runs `cargo nextest run --profile ci`.

[profile.default]
retries = 0
fail-fast = true
slow-timeout = { period = "30s" }

# tauri::test mock-runtime binaries abort with STATUS_ENTRYPOINT_NOT_FOUND on
# Windows (upstream, unresolved: tauri-apps/tauri#13419, #13954). Windows
# coverage for the shell comes from the native-smoke job driving the REAL
# binary instead; these platform-agnostic mock tests still run on macOS/Linux.
[[profile.default.overrides]]
platform = "cfg(windows)"
default-filter = "not package(loam-desktop)"

[profile.ci]
retries = 0
fail-fast = false
failure-output = "immediate-final"
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.ci.overrides]]
platform = "cfg(windows)"
default-filter = "not package(loam-desktop)"

[profile.ci.junit]
path = "junit.xml"
