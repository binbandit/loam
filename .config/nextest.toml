# cargo-nextest profiles (see SPEC.md D10).
# Local runs use `default`; CI runs `cargo nextest run --profile ci`.

[profile.default]
retries = 0
fail-fast = true
slow-timeout = { period = "30s" }

[profile.ci]
retries = 0
fail-fast = false
failure-output = "immediate-final"
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.ci.junit]
path = "junit.xml"
