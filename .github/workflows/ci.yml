# §5.13 gate order: lint/format → tests → license audit → bundle budget → perf → build artifacts.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# A superseding commit cancels obsolete in-progress runs on the same ref —
# including main: only the newest push's verdict matters, and cancelled runs
# stop billing immediately.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# Local-first, private by default (§2) applies to our tooling too: no tool
# telemetry in any environment. DO_NOT_TRACK is the cross-tool standard;
# explicit flags cover tools that predate it. Astro is preemptive for E27.
env:
  DO_NOT_TRACK: "1"
  TURBO_TELEMETRY_DISABLED: "1"
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  lint:
    name: Lint & format
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: ./.github/actions/setup-native # rust-toolchain.toml + Linux WebKit deps; cache keyed by Cargo.lock + toolchain
      - uses: taiki-e/install-action@v2 # gates:check exercises the cargo-deny negative fixture
        with:
          tool: cargo-deny@0.19.4
      - name: Lint (Biome, typecheck, Clippy -D warnings)
        run: pnpm lint
      - name: Format check (Biome, rustfmt)
        run: pnpm format:check
      - name: Quality gates reject bad fixtures
        run: pnpm gates:check
      - name: Governance (licenses, DCO self-test, affiliation scan)
        run: pnpm governance:check
      - name: Rename protocol self-test (§9.4)
        run: pnpm rename:check
      - name: Security config check (§5.10)
        run: pnpm security:check
      - name: Native checklist completeness (§5.12)
        run: pnpm checklist:check
      - name: DCO sign-off (PR commits)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          node scripts/check-dco.mjs "origin/${{ github.base_ref }}..HEAD"

  test:
    name: Test (${{ matrix.os }})
    timeout-minutes: 30
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: ./.github/actions/setup-native
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Unit and workspace tests
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            # 0xC0000142 process-init failures are a known Windows-runner
            # transient; real test failures fail all three attempts.
            for attempt in 1 2 3; do
              pnpm test && break
              [ "$attempt" = 3 ] && exit 1
              echo "::warning::pnpm test attempt $attempt failed; retrying"
            done
          else
            pnpm test
          fi
        env:
          NEXTEST_PROFILE: ci
          # Runner trash is disposable: exercise the real OS-trash integration.
          LOAM_TEST_REAL_TRASH: "1"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-
      - name: Install Playwright browser
        run: pnpm --filter @loam-app/desktop exec playwright install ${{ runner.os == 'Linux' && '--with-deps' || '' }} chromium
      - name: Browser smoke (Playwright)
        run: pnpm test:e2e
        env:
          CI: "true"
      - name: Upload failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}
          path: |
            apps/desktop/playwright-report/
            apps/desktop/test-results/
            target/nextest/ci/junit.xml
          if-no-files-found: ignore
          retention-days: 7

# Native shell smoke (LOA-49): tauri-driver drives the page on Windows/Linux.
  # macOS has no WKWebView WebDriver, so its leg is a boot-level smoke (process
  # alive + real window + screenshot artifact); page-level macOS checks remain
  # in docs/native-smoke-checklist.md.
  native-smoke:
    name: Native smoke (${{ matrix.os }})
    timeout-minutes: 30
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: ./.github/actions/setup-native
      - name: Install WebKitGTK driver and Xvfb
        if: runner.os == 'Linux'
        run: sudo apt-get install -y -qq webkit2gtk-driver xvfb
      - name: Install tauri-driver (cached binary)
        if: runner.os != 'macOS'
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: tauri-driver@2.0.6
      # msedgedriver must match the WebView2 *runtime* version (not Edge), or
      # the session dies with "DevToolsActivePort file doesn't exist".
      - name: Install msedgedriver matching the WebView2 runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (Get-ItemProperty 'HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}').pv
          Write-Host "WebView2 runtime: $version"
          $url = "https://msedgedriver.microsoft.com/$version/edgedriver_win64.zip"
          try {
            Invoke-WebRequest $url -OutFile edgedriver.zip
          } catch {
            $major = $version.Split('.')[0]
            $fallback = (Invoke-WebRequest "https://msedgedriver.microsoft.com/LATEST_RELEASE_$major" -UseBasicParsing).Content.Trim()
            Write-Host "Exact driver missing; using latest for major ${major}: $fallback"
            Invoke-WebRequest "https://msedgedriver.microsoft.com/$fallback/edgedriver_win64.zip" -OutFile edgedriver.zip
          }
          Expand-Archive edgedriver.zip -DestinationPath "$env:RUNNER_TEMP\edgedriver" -Force
          "LOAM_NATIVE_DRIVER=$env:RUNNER_TEMP\edgedriver\msedgedriver.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      # custom-protocol embeds the built frontend; a bare cargo binary serves
      # devUrl and renders a blank window (root cause of earlier smoke reds).
      - name: Build the shell with embedded frontend
        run: |
          pnpm --filter @loam-app/desktop build
          cargo build -p loam-desktop --features custom-protocol
      - name: Run native smoke
        working-directory: apps/desktop
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run --auto-servernum node native-smoke/smoke.mjs
          elif [ "$RUNNER_OS" = "Windows" ]; then
            # Full WebDriver leg is upstream-blocked on Windows (see
            # windows-boot.mjs header); LOAM_SMOKE_WEBDRIVER=1 re-attempts it.
            if [ "$LOAM_SMOKE_WEBDRIVER" = "1" ]; then
              node native-smoke/smoke.mjs
            else
              node native-smoke/windows-boot.mjs
            fi
          else
            node native-smoke/macos-boot.mjs
          fi
      - name: Upload boot screenshots
        if: runner.os != 'Linux' && always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-screenshot-${{ matrix.os }}
          path: |
            apps/desktop/native-results/macos-boot.png
            apps/desktop/native-results/windows-boot.png
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload native failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-smoke-${{ matrix.os }}
          path: apps/desktop/native-results/
          if-no-files-found: ignore
          retention-days: 7

  coverage:
    name: Coverage gates
    timeout-minutes: 20
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: actions-rust-lang/setup-rust-toolchain@v1 # loam-core only; no Tauri system deps needed
        with:
          components: llvm-tools
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov
      - name: Collect coverage and enforce §5.12 gates
        run: pnpm coverage
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/
            packages/ui/coverage/coverage-summary.json
            packages/ui/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 7

  license-audit:
    name: License audit
    timeout-minutes: 15
    needs: [test, coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.4
      - name: Audit JS and Rust dependency licenses (offline)
        run: pnpm licenses:audit

  bundle-budget:
    name: Bundle budget
    timeout-minutes: 10
    needs: license-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - name: Cold-path bundle content check (§5.9)
        run: pnpm bundle:check

  perf:
    name: Perf smoke
    timeout-minutes: 20
    needs: bundle-budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-native
      # Switcher SLO + regression gates (LOA-93, §5.9): p95 first-batch,
      # total, and empty-query latencies on the bench-10k record set, gated
      # against absolute SLOs and baselines/switcher.json × 1.10.
      - name: Switcher bench gates (bench-10k)
        run: cargo run --release -p loam-bench -- switcher --check

# Unsigned development artifacts (LOA-11). No signing secrets exist in this
  # workflow at all; publication is additionally gated to trusted (same-repo) runs.
  build-artifacts:
    name: Build artifacts (${{ matrix.os }})
    timeout-minutes: 45
    needs: perf
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-workspace
      - uses: ./.github/actions/setup-native
      - name: Build unsigned dev artifacts (or emit E01 skip markers)
        run: node scripts/build-artifacts.mjs
      - name: Publish artifacts (trusted workflows only)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@v4
        with:
          name: dev-artifacts-${{ matrix.os }}
          path: dist/artifacts/
          retention-days: 7
