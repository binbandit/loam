name: Setup native toolchain
description: Pinned Rust toolchain plus the Linux system libraries required to compile the Tauri shell

inputs:
  components:
    description: Extra rustup components (comma-separated), e.g. llvm-tools
    default: ""

runs:
  using: composite
  steps:
    - name: Install Linux WebKit/GTK build dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev patchelf
    - uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: ${{ inputs.components }}
