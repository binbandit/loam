name: Setup workspace
description: Install pinned Node + pnpm and workspace dependencies with store caching

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4 # reads the pinned version from package.json#packageManager
    - uses: actions/setup-node@v4
      with:
        node-version-file: .node-version
        cache: pnpm # store cache keyed by pnpm-lock.yaml — a lockfile change misses by design
    # Turborepo's local cache is content-hashed, so restoring a stale cache is
    # always safe and turns unchanged typecheck/test tasks into replays.
    - uses: actions/cache@v4
      with:
        path: .turbo/cache
        key: turbo-${{ runner.os }}-${{ github.sha }}
        restore-keys: turbo-${{ runner.os }}-
    - run: pnpm install --frozen-lockfile
      shell: bash
